<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>3663 Clicker Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
         :root {
            --bg: #0f1115;
            --panel-bg: #1a1d24;
            --accent: #ff9d1c;
            --accent-glow: rgba(255, 157, 28, 0.6);
            --text: #ffffff;
            --text-dim: #8b9eb3;
            --success: #2ecc71;
            --danger: #e74c3c;
            --info: #3498db;
        }
        
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            /* Safari Support */
            -webkit-tap-highlight-color: transparent;
            /* Behebt das blaue Flackern beim Tippen! */
        }
        
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            display: flex;
            height: 100vh;
            /* Fallback für alte Browser */
            height: 100dvh;
            /* Dynamische Höhe (behebt den Suchleisten-Bug) */
            padding-top: env(safe-area-inset-top);
            /* Behebt Probleme mit der Notch */
            padding-bottom: env(safe-area-inset-bottom);
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
            overflow: hidden;
        }
        
        #particles-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .column {
            position: relative;
            z-index: 10;
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .col-left {
            width: 320px;
            background: var(--panel-bg);
            padding: 20px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 5px 0 15px rgba(0, 0, 0, 0.3);
            overflow-y: auto;
        }
        
        .col-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .col-right {
            width: 350px;
            background: var(--panel-bg);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: -5px 0 15px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }
        
        .panel-header {
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 20px;
            color: var(--accent);
        }
        
        .stat-box {
            background: rgba(0, 0, 0, 0.2);
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 157, 28, 0.2);
        }
        
        .stat-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-value {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent);
        }
        
        .rebirth-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #9b59b6, #8e44ad);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
            margin-bottom: 15px;
            box-shadow: 0 0 15px rgba(155, 89, 182, 0.4);
            transition: transform 0.2s;
        }
        
        .rebirth-btn:hover:not(:disabled) {
            transform: scale(1.02);
        }
        
        .rebirth-btn:disabled {
            background: #333;
            color: #777;
            cursor: not-allowed;
            box-shadow: none;
        }
        
        .planet-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .planet-item.active {
            border-color: var(--info);
            background: rgba(52, 152, 219, 0.1);
            box-shadow: inset 0 0 10px rgba(52, 152, 219, 0.2);
        }
        
        .planet-item.locked {
            opacity: 0.4;
            filter: grayscale(100%);
            cursor: not-allowed;
        }
        
        .planet-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin-right: 15px;
            background-size: cover;
            background-position: center;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }
        
        .planet-info {
            flex: 1;
        }
        
        .planet-name {
            font-weight: bold;
            font-size: 14px;
        }
        
        .planet-desc {
            font-size: 11px;
            color: var(--text-dim);
        }
        
        .score-container {
            text-align: center;
            margin-bottom: 40px;
            z-index: 20;
        }
        
        #score {
            font-size: 5rem;
            font-weight: 800;
            text-shadow: 0 0 20px var(--accent-glow);
            line-height: 1;
        }
        
        #cps-display {
            font-size: 1.2rem;
            color: var(--text-dim);
            margin-top: 10px;
        }
        
        .target-container {
            position: relative;
            z-index: 20;
        }
        
        #click-target {
            width: 280px;
            height: 280px;
            border-radius: 50%;
            cursor: pointer;
            object-fit: cover;
            border: 8px solid var(--accent);
            box-shadow: 0 0 50px rgba(255, 157, 28, 0.4), inset 0 0 20px rgba(0, 0, 0, 0.5);
            transition: transform 0.05s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.3s;
            animation: pulseTarget 4s infinite alternate ease-in-out;
            background-color: #000;
            outline: none;
            /* Zusätzlicher Schutz gegen Markierungen */
        }
        
        #click-target:active {
            transform: scale(0.9) !important;
            box-shadow: 0 0 20px rgba(255, 157, 28, 0.6);
            border-color: #fff;
        }
        
        @keyframes pulseTarget {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.03);
            }
        }
        
        .combo-container {
            width: 300px;
            background: #000;
            height: 12px;
            border-radius: 6px;
            margin-top: 40px;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
        }
        
        #combo-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f1c40f, var(--accent), #e74c3c);
            transition: width 0.1s linear;
        }
        
        #combo-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: -25px;
            font-size: 14px;
            font-weight: bold;
            color: var(--accent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .shop-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 1.5rem;
            font-weight: 800;
            text-align: center;
        }
        
        .shop-items {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .shop-tier-header {
            font-size: 12px;
            color: var(--text-dim);
            text-align: center;
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }
        
        .upgrade-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .upgrade-item:hover:not(.disabled) {
            background: rgba(255, 157, 28, 0.1);
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        
        .upgrade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(100%);
        }
        
        .upgrade-icon {
            font-size: 28px;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45px;
            height: 45px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 8px;
        }
        
        .upgrade-info {
            flex: 1;
        }
        
        .upgrade-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }
        
        .upgrade-cost {
            color: var(--danger);
            font-size: 13px;
            font-weight: bold;
        }
        
        .upgrade-item:not(.disabled) .upgrade-cost {
            color: var(--success);
        }
        
        .upgrade-stats {
            font-size: 11px;
            color: var(--text-dim);
            margin-top: 4px;
        }
        
        .upgrade-count {
            font-size: 20px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.1);
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .floating-text {
            position: absolute;
            font-weight: 800;
            pointer-events: none;
            z-index: 100;
            animation: floatAndFade 1.2s cubic-bezier(0.215, 0.610, 0.355, 1) forwards;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }
        
        .crit-text {
            color: var(--danger);
            font-size: 36px !important;
            animation: critFloat 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            text-shadow: 0 0 10px rgba(231, 76, 60, 0.8);
        }
        
        @keyframes floatAndFade {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-50px) scale(1.2);
            }
            100% {
                opacity: 0;
                transform: translateY(-100px) scale(0.8);
            }
        }
        
        @keyframes critFloat {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.5) rotate(-10deg);
            }
            20% {
                transform: translateY(-30px) scale(1.5) rotate(5deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-80px) scale(1) rotate(0deg);
            }
        }
        /* Modal Styles */
        
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            transition: opacity 0.3s;
        }
        
        .modal-overlay.hidden {
            display: none;
            opacity: 0;
        }
        
        .modal-box {
            background: var(--panel-bg);
            border: 2px solid var(--accent);
            border-radius: 15px;
            padding: 25px;
            width: 400px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 157, 28, 0.3);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        
        .modal-box h3 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.5rem;
        }
        
        .modal-box p {
            margin-bottom: 25px;
            color: var(--text);
            font-size: 1.1rem;
        }
        
        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }
        
        .modal-buttons button {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            flex: 1;
        }
        
        .btn-ok {
            background: var(--success);
            color: white;
        }
        
        .btn-cancel {
            background: var(--danger);
            color: white;
        }
        
        .btn-ok:hover {
            background: #27ae60;
        }
        
        .btn-cancel:hover {
            background: #c0392b;
        }
        
        #toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: bottom 0.3s;
            z-index: 1000;
        }
        
        #toast.show {
            bottom: 20px;
        }
        
         ::-webkit-scrollbar {
            width: 8px;
        }
        
         ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        
         ::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 4px;
        }
        
         ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
        
        .settings-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .promo-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .promo-row input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.3);
            color: white;
            font-family: 'Poppins', sans-serif;
            min-width: 0;
        }
        
        .promo-row button {
            padding: 8px 12px;
            background: var(--info);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        
        .promo-row button:hover {
            background: #2980b9;
        }
        
        select.lang-select {
            background: var(--bg);
            color: var(--text);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 5px;
            border-radius: 5px;
            outline: none;
        }
        /* --- MOBILE NAVIGATION & RESPONSIVE DESIGN --- */
        
        .mobile-nav {
            display: none;
        }
        
        @media (max-width: 1024px) {
            body {
                flex-direction: column;
            }
            .mobile-nav {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                position: fixed;
                bottom: env(safe-area-inset-bottom, 0);
                left: 0;
                width: 100%;
                height: 70px;
                background: var(--panel-bg);
                border-top: 2px solid var(--accent);
                z-index: 1000;
            }
            .nav-item {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                color: var(--text-dim);
                cursor: pointer;
                transition: color 0.2s, background 0.2s;
            }
            .nav-item.active {
                color: var(--accent);
                background: rgba(255, 157, 28, 0.1);
            }
            .nav-item-icon {
                font-size: 20px;
                margin-bottom: 4px;
            }
            .column {
                width: 100% !important;
                position: absolute;
                top: 0;
                left: 0;
                /* Dynamische Höhe abzüglich Menüleiste und Notch/Home-Indikator */
                height: calc(100dvh - 70px - env(safe-area-inset-bottom, 0)) !important;
                display: none !important;
                border: none !important;
                box-shadow: none !important;
            }
            .col-left,
            .col-right {
                padding-bottom: 20px !important;
            }
            /* Aktiver Tab */
            .column.active-tab {
                display: flex !important;
            }
            #score {
                font-size: 3.5rem;
                /* Resize huge score for mobile */
            }
            #click-target {
                width: 220px;
                height: 220px;
                /* Resize target for mobile */
            }
            #toast.show {
                bottom: calc(90px + env(safe-area-inset-bottom, 0));
                /* Move toast above mobile nav */
            }
        }
    </style>
</head>

<body>
    <canvas id="particles-canvas"></canvas>

    <div id="game-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h3 id="modal-title">Titel</h3>
            <p id="modal-text">Text</p>
            <div class="modal-buttons">
                <button id="modal-btn-cancel" class="btn-cancel hidden">Abbrechen</button>
                <button id="modal-btn-ok" class="btn-ok">OK</button>
            </div>
        </div>
    </div>

    <div class="column col-left">
        <h2 class="panel-header" id="txt-stats">Statistiken</h2>
        <div class="stat-box">
            <div class="stat-label" id="txt-total-clicks">Klicks gesamt</div>
            <div class="stat-value" id="stat-total-clicks">0</div>
        </div>
        <div class="stat-box">
            <div class="stat-label" id="txt-cpc">Klick-Stärke</div>
            <div class="stat-value" id="stat-cpc">1</div>
        </div>
        <div class="stat-box">
            <div class="stat-label" id="txt-cps">Automatischer CPS</div>
            <div class="stat-value" id="stat-cps">0</div>
        </div>
        <div class="stat-box" style="border-color: #9b59b6;">
            <div class="stat-label" id="txt-rebirths" style="color:#9b59b6;">Rebirths</div>
            <div class="stat-value" id="stat-rebirths" style="color:#9b59b6;">0</div>
        </div>

        <button class="rebirth-btn" id="btn-rebirth" onclick="performRebirth()">Rebirth</button>

        <h2 class="panel-header" style="margin-top: 10px; font-size: 1.2rem; color: var(--info);" id="txt-planets">Universum</h2>
        <div id="planet-container"></div>

        <div style="margin-top: auto;">
            <div class="promo-row">
                <input type="text" id="promo-code-input" placeholder="Promo Code...">
                <button id="btn-redeem" onclick="redeemCode()">Einlösen</button>
            </div>

            <div class="settings-row">
                <span id="txt-lang" style="font-size: 12px; color: var(--text-dim);">Sprache:</span>
                <select class="lang-select" id="lang-select" onchange="changeLang(this.value)">
                    <option value="de">Deutsch (German)</option>
                    <option value="en">English (English)</option>
                    <option value="es">Español (Spanish)</option>
                    <option value="fr">Français (French)</option>
                    <option value="it">Italiano (Italian)</option>
                    <option value="pt">Português (Portuguese)</option>
                    <option value="nl">Nederlands (Dutch)</option>
                    <option value="pl">Polski (Polish)</option>
                    <option value="ru">Русский (Russian)</option>
                    <option value="ja">日本語 (Japanese)</option>
                    <option value="zh">中文 (Chinese)</option>
                    <option value="ko">한국어 (Korean)</option>
                    <option value="ar">العربية (Arabic)</option>
                    <option value="hi">हिन्दी (Hindi)</option>
                    <option value="tr">Türkçe (Turkish)</option>
                    <option value="sv">Svenska (Swedish)</option>
                    <option value="da">Dansk (Danish)</option>
                    <option value="fi">Suomi (Finnish)</option>
                    <option value="el">Ελληνικά (Greek)</option>
                    <option value="cs">Čeština (Czech)</option>
                </select>
            </div>
            <button id="btn-reset" onclick="resetGame()" style="width:100%; padding:10px; background:var(--danger); color:#fff; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-top: 15px;">Spielstand löschen</button>
        </div>
    </div>

    <div class="column col-center active-tab">
        <div class="score-container">
            <div id="score">0</div>
            <div id="cps-display">0 pro Sekunde</div>
        </div>

        <div class="target-container">
            <img id="click-target" src="https://picsum.photos/seed/earth/280/280" alt="Target" draggable="false">
        </div>

        <div class="combo-container">
            <div id="combo-text"><span id="txt-combo">Combo Multiplikator:</span> x<span id="combo-val">1.0</span></div>
            <div id="combo-bar"></div>
        </div>
    </div>

    <div class="column col-right">
        <div class="shop-header" id="txt-shop">Upgrades Shop</div>
        <div class="shop-items" id="shop-container"></div>
    </div>

    <nav class="mobile-nav">
        <div class="nav-item" onclick="switchTab('col-left', this)">
            <span class="nav-item-icon">📊</span>
            <span>Stats</span>
        </div>
        <div class="nav-item active" onclick="switchTab('col-center', this)">
            <span class="nav-item-icon">🖱️</span>
            <span>Klicker</span>
        </div>
        <div class="nav-item" onclick="switchTab('col-right', this)">
            <span class="nav-item-icon">🛒</span>
            <span>Shop</span>
        </div>
    </nav>

    <div id="toast">Spielstand gespeichert!</div>

    <script>
        // --- 20 LANGUAGES TRANSLATIONS ---
        const i18n = {
            de: {
                stats: "Statistiken",
                totalClicks: "Klicks gesamt",
                cpc: "Klick-Stärke",
                cps: "Auto CPS",
                rebirths: "Rebirths",
                rebirthBtn: "Rebirth ({cost})",
                planets: "Universum",
                reset: "Daten löschen",
                resetConfirm: "Wirklich alles löschen?",
                combo: "Combo:",
                shop: "Shop",
                perSec: "pro Sekunde",
                clicks: "Klicks",
                reqRebirth: "Ab {req} Rebirths",
                toast: "Gespeichert!",
                lang: "Sprache:",
                boost: "Boost",
                codePH: "Code...",
                btnRedeem: "Einlösen",
                codeInvalid: "Ungültiger Code!",
                codeUsed: "Code bereits genutzt!",
                unlockMsg: "Planet freigeschaltet!",
                scoreMsg: "Klicks erhalten!",
                btnOk: "OK",
                btnCancel: "Abbrechen",
                planetNames: ["Erde", "Mond", "Mars", "Jupiter", "Nebula", "Singularität"],
                baseUpg: ["Maus", "Praktikant", "Arbeiter", "Farm", "Mine", "Fabrik", "Server", "KI-Bot", "Quanten-PC", "Portal"],
                shopTiers: "UPGRADES"
            },
            en: {
                stats: "Statistics",
                totalClicks: "Total Clicks",
                cpc: "Click Power",
                cps: "Auto CPS",
                rebirths: "Rebirths",
                rebirthBtn: "Rebirth ({cost})",

        // --- MODAL LOGIC ---
        function showModal(title, text, isConfirm = false, onConfirm = null) {
            const t = i18n[currentLang];

            const btnCancel = document.getElementById('modal-btn-cancel');
            const btnOk = document.getElementById('modal-btn-ok');

            btnCancel.innerText = t.btnCancel;
            btnOk.innerText = t.btnOk;

            btnCancel.style.display = isConfirm ? 'inline-block' : 'none';

            btnOk.onclick = () => {
                document.getElementById('game-modal').classList.add('hidden');
                if (isConfirm && onConfirm) onConfirm();

            btnCancel.onclick = () => {
                document.getElementById('game-modal').classList.add('hidden');

        // --- INITIALIZATION ---
        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.has('lang')) {
                currentLang = urlParams.get('lang');

                els.langSelect.value = currentLang;
            }

            loadGame();
            applyLanguage();
            renderPlanets();
            renderShop();
            updateUI();
            setTargetImage();

            let lastTime = performance.now();

            function gameLoop(time) {
                const deltaTime = (time - lastTime) / 1000;
                lastTime = time;

                const currentCps = getCps();
                if (currentCps > 0) {
                    game.score += currentCps * deltaTime;
                    updateUI();
                }

                if (game.combo > 0) {
                    game.combo -= 15 * deltaTime;
                    if (game.combo < 0) game.combo = 0;
                    updateComboUI();
                }

                requestAnimationFrame(gameLoop);
            }
            requestAnimationFrame(gameLoop);
            setInterval(saveGame, 10000);
        }

        // --- CORE MECHANICS ---
        function formatNumber(num) {
            if (num < 1000) return Math.floor(num).toString();
            const suffixes = ["", "k", "M", "B", "T", "Qa", "Qi"];
            const suffixNum = Math.floor(("" + Math.floor(num)).length / 3);
            let shortValue = parseFloat((suffixNum != 0 ? (num / Math.pow(1000, suffixNum)) : num).toPrecision(3));
            if (shortValue % 1 != 0) shortValue = shortValue.toFixed(1);
            return shortValue + suffixes[suffixNum];
        }

        function getActivePlanet() {
            return planetsData[game.activePlanet] || planetsData[0];
        }

        function getRebirthMultiplier() {
            return 1 + (game.rebirths * 0.5);
        }

        function getMaxPlanetUnlocked() {
            // Find max planet unlocked via rebirth OR via codes
            let maxReb = 0;
            planetsData.forEach((p, i) => {
                if (game.rebirths >= p.req) maxReb = i;
            });
            const maxCode = Math.max(...game.unlockedPlanets);
            return Math.max(maxReb, maxCode);
        }

        function isPlanetUnlocked(index) {
            return game.rebirths >= planetsData[index].req || game.unlockedPlanets.includes(index);
        }

        function getCpc() {
            let base = 1;
            upgrades.forEach(u => base += u.count * u.cpcAdd);
            return base * getActivePlanet().mult * getRebirthMultiplier();
        }

        function getCps() {
            let base = 0;
            upgrades.forEach(u => base += u.count * u.cpsAdd);
            return base * getActivePlanet().mult * getRebirthMultiplier();
        }

        function getComboMultiplier() {
            if (game.combo > 80) return 2.0;
            if (game.combo > 50) return 1.5;
            if (game.combo > 20) return 1.2;
            return 1.0;
        }

        function getRebirthCost() {
            return Math.floor(1000000 * Math.pow(4, game.rebirths));
        }

        // --- INTERACTIONS ---
        els.target.addEventListener('mousedown', (e) => {
            const isCrit = Math.random() < 0.1;
            const mult = getComboMultiplier();
            let clickPower = getCpc() * mult;

            if (isCrit) clickPower *= 3;

            game.score += clickPower;
            game.totalClicks++;
            game.combo = Math.min(100, game.combo + 8);

            createFloatingText(e.clientX, e.clientY, clickPower, isCrit);
            createClickParticle(e.clientX, e.clientY);

            updateUI();
            updateComboUI();
            checkShopAvailability();
        });

        els.target.addEventListener('touchstart', (e) => {
            // Verhindert zusätzliches Scroll-Verhalten beim schnellen Tippen
            if (e.cancelable) e.preventDefault();
            const touch = e.touches[0];

            const isCrit = Math.random() < 0.1;
            const mult = getComboMultiplier();
            let clickPower = getCpc() * mult;

            if (isCrit) clickPower *= 3;

            game.score += clickPower;
            game.totalClicks++;
            game.combo = Math.min(100, game.combo + 8);

            createFloatingText(touch.clientX, touch.clientY, clickPower, isCrit);
            createClickParticle(touch.clientX, touch.clientY);

            updateUI();

            // Simuliert den :active status visuell für Touch-Geräte

            els.target.style.boxShadow = "0 0 20px rgba(255, 157, 28, 0.6)";
            els.target.style.borderColor = "#fff";

        function buyUpgrade(index) {
            const upg = upgrades[index];
            const cost = Math.floor(upg.baseCost * Math.pow(upg.costMult, upg.count));
            if (game.score >= cost) {
                game.score -= cost;
                upg.count++;
                renderShop();
                updateUI();
            }
        }

        window.performRebirth = function() {
            const cost = getRebirthCost();
            if (game.score >= cost) {
                game.rebirths++;
                game.score = 0;
                game.combo = 0;
                game.activePlanet = 0;
                upgrades.forEach(u => u.count = 0);
                saveGame();
                renderShop();
                renderPlanets();
                setTargetImage();
                updateUI();
            }
        }

        window.travelToPlanet = function(planetIndex) {
            if (isPlanetUnlocked(planetIndex)) {
                game.activePlanet = planetIndex;
                saveGame();
                renderPlanets();
                setTargetImage();
                updateUI();
            }
        }

        window.redeemCode = function() {
            const code = els.promoInput.value.trim().toUpperCase();
            els.promoInput.value = '';
            const t = i18n[currentLang];

            if (!code) return;

            const promo = promoCodes[code];
            if (!promo) {
                showModal("Code", t.codeInvalid);
                return;
            }

            if (promo.type === "score") {
                if (game.redeemedCodes.includes(code)) {
                    showModal("Code", t.codeUsed);
                    return;
                }
                game.score += promo.amount;
                game.redeemedCodes.push(code);
                showModal("Code", t.scoreMsg + "\n+" + formatNumber(promo.amount) + " " + t.clicks);
            } else if (promo.type === "unlock_planet") {
                if (!game.unlockedPlanets.includes(promo.planetIndex)) {
                    game.unlockedPlanets.push(promo.planetIndex);
                    showModal("Code", t.unlockMsg + "\n(" + t.planetNames[promo.planetIndex] + ")");
                } else {
                    showModal("Code", t.codeUsed);
                    return;
                }
            }

            saveGame();
            updateUI();
            renderPlanets();
            renderShop(); // Refresh shop to show newly unlocked tier items!
        }

            const t = i18n[currentLang];

            els.statClicks.textContent = formatNumber(game.totalClicks);
            els.statCpc.textContent = formatNumber(getCpc());
            els.statCps.textContent = formatNumber(getCps());
            els.statRebirths.textContent = game.rebirths;

            const rebirthCost = getRebirthCost();
            els.btnRebirth.innerText = t.rebirthBtn.replace('{cost}', formatNumber(rebirthCost));
            if (game.score >= rebirthCost) {
                els.btnRebirth.disabled = false;
            } else {
                els.btnRebirth.disabled = true;
            }

            if (Math.random() < 0.1) checkShopAvailability();

        function updateComboUI() {
            els.comboBar.style.width = game.combo + '%';

                els.comboText.style.opacity = '0';

        function renderShop() {
            const t = i18n[currentLang];
            els.shop.innerHTML = '';

            const maxP = getMaxPlanetUnlocked();
            let currentPlanetHeader = -1;

            upgrades.forEach((upg, index) => {
                // Nur Upgrades für Planeten anzeigen, die bereits freigeschaltet wurden
                if (upg.reqPlanet > maxP) return;

                // Dynamische Header für den Shop-Tiers einfügen
                if (upg.reqPlanet > currentPlanetHeader) {
                    currentPlanetHeader = upg.reqPlanet;
                    const header = document.createElement('div');
                    header.className = 'shop-tier-header';
                    header.innerText = `--- ${t.planetNames[currentPlanetHeader]} ${t.shopTiers} ---`;
                    els.shop.appendChild(header);
                }

                const cost = Math.floor(upg.baseCost * Math.pow(upg.costMult, upg.count));
                const isAffordable = game.score >= cost;

                const baseName = t.baseUpg[upg.locId];
                const fullName = `${baseName} Mk${upg.tier}`;
                let descText = "";
                if (upg.cpcAdd > 0) descText = `+${formatNumber(upg.cpcAdd)} ${t.cpc}`;
                if (upg.cpsAdd > 0) descText = `+${formatNumber(upg.cpsAdd)} CPS`;

                const item = document.createElement('div');
                item.className = `upgrade-item ${isAffordable ? '' : 'disabled'}`;
                item.id = `upg-${index}`;
                item.onclick = () => buyUpgrade(index);

                item.innerHTML = `
                    <div class="upgrade-icon">${upg.icon}</div>
                    <div class="upgrade-info">
                        <div class="upgrade-name">${fullName}</div>
                        <div class="upgrade-cost">${formatNumber(cost)} ${t.clicks}</div>
                        <div class="upgrade-stats">${descText}</div>
                    </div>
                    <div class="upgrade-count">${upg.count}</div>
                `;
                els.shop.appendChild(item);

            const t = i18n[currentLang];
            els.planets.innerHTML = '';
            planetsData.forEach((p, index) => {
                        const isUnlocked = isPlanetUnlocked(index);
                        const isActive = game.activePlanet === index;
                        const pName = t.planetNames[index];

                        const div = document.createElement('div');
                        div.className = `planet-item ${isActive ? 'active' : ''} ${!isUnlocked ? 'locked' : ''}`;
                        div.onclick = () => travelToPlanet(index);

                    <div class="planet-icon" style="background-image: url('${p.img}'); border-color: ${p.color}"></div>

                        <div class="planet-name" style="color: ${p.color}">${pName}</div>

                els.planets.appendChild(div);

            const p = getActivePlanet();

        function checkShopAvailability() {
            const maxP = getMaxPlanetUnlocked();
            upgrades.forEach((upg, index) => {
                if (upg.reqPlanet > maxP) return;
                const cost = Math.floor(upg.baseCost * Math.pow(upg.costMult, upg.count));
                const el = document.getElementById(`upg-${index}`);
                if (el) {
                    if (game.score >= cost) el.classList.remove('disabled');
                    else el.classList.add('disabled');
                }
            });

        // --- VISUAL EFFECTS ---
        function createFloatingText(x, y, amount, isCrit) {
            const el = document.createElement('div');
            el.textContent = '+' + formatNumber(amount);
            el.className = `floating-text ${isCrit ? 'crit-text' : ''}`;

            if (isCrit) el.textContent = 'KRIT! ' + el.textContent;

            const offsetX = (Math.random() - 0.5) * 60;
            const offsetY = (Math.random() - 0.5) * 40;
            const p = getActivePlanet();

            const colors = [p.color, '#fff', 'var(--accent)'];
            el.style.color = isCrit ? 'var(--danger)' : colors[Math.floor(Math.random() * colors.length)];
            el.style.fontSize = (24 + (Math.random() * 8)) + 'px';
            el.style.left = (x + offsetX - 20) + 'px';
            el.style.top = (y + offsetY - 20) + 'px';

            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        // --- BACKGROUND PARTICLES ---
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let bgParticles = [];
        class BgParticle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 1;
                this.speed = Math.random() * 2 + 0.5;
                this.opacity = Math.random() * 0.5 + 0.1;
                this.color = getActivePlanet().color;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -10) {
                    this.y = canvas.height + 10;
                    this.x = Math.random() * canvas.width;
                    this.color = getActivePlanet().color;
                }
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        for (let i = 0; i < 50; i++) bgParticles.push(new BgParticle());

        function animateBg() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bgParticles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animateBg);
        }
        animateBg();

        function createClickParticle(x, y) {
            for (let i = 0; i < 5; i++) {
                const p = new BgParticle();
                p.x = x;
                p.y = y;
                p.speed = Math.random() * 5 + 2;
                p.size = Math.random() * 4 + 2;
                p.opacity = 1;
                p.color = getActivePlanet().color;
                bgParticles.push(p);
                setTimeout(() => bgParticles.shift(), 2000);
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        // --- SAVE/LOAD ---
        function saveGame() {
            const saveData = {
                game: game,
                counts: upgrades.map(u => u.count)
            };
            localStorage.setItem('3663clicker_pro_save', JSON.stringify(saveData));
            showToast();
        }

        function loadGame() {
            const saved = localStorage.getItem('3663clicker_pro_save');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    
                    if(typeof parsed.game.activePlanet === 'string') {
                         parsed.game.activePlanet = 0;
                    }

                    game = { ...game, ...parsed.game };
                    
                    // Initialize arrays for older saves
                    if(!game.redeemedCodes) game.redeemedCodes = [];
                    if(!game.unlockedPlanets) game.unlockedPlanets = [0];
                    
                    if(parsed.counts) {
                        parsed.counts.forEach((count, i) => {
                            if (upgrades[i]) upgrades[i].count = count;
                        });
                    }
                } catch (e) {
                    console.error("Fehler beim Laden", e);
                }
            }
        }

        window.resetGame = function() {
            const t = i18n[currentLang];
            showModal(t.reset, t.resetConfirm, true, () => {
                localStorage.removeItem('3663clicker_pro_save');
                location.reload();
            });
        }

        function showToast() {
            const t = i18n[currentLang];
            els.toast.innerText = t.toast;
            els.toast.classList.add('show');
            setTimeout(() => els.toast.classList.remove('show'), 2000);
        }

        // --- MOBILE TAB SWITCHER ---
        window.switchTab = function(targetClass, btnElement) {
            if (window.innerWidth > 1024) return; // Nur auf Mobile ausführen
            
            // Verstecke alle Spalten
            document.querySelector('.col-left').classList.remove('active-tab');
            document.querySelector('.col-center').classList.remove('active-tab');
            document.querySelector('.col-right').classList.remove('active-tab');
            
            // Zeige die ausgewählte Spalte
            document.querySelector('.' + targetClass).classList.add('active-tab');
            
            // UI Update für den aktiven Tab in der Navigation
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            btnElement.classList.add('active');
        };

        init();
    </script>
</body>

</html>
